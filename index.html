<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Manav Joshi</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Host · Founder · Bathroom Singer">
  <meta property="og:title" content="Manav Joshi">
  <meta property="og:description" content="Host · Founder · Bathroom Singer">
  <meta name="theme-color" content="#080808">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"></noscript>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pad-x: clamp(24px, 7vw, 80px);
      --pad-top: clamp(20px, 4.5vw, 40px);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #080808; color: #fff;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Background ─────────────────────────── */
    .bg { position: fixed; inset: 0; z-index: 0; }
    .bg-layer {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center 30%;
      will-change: opacity;
    }
    #layer1 { opacity: 1; } #layer2 { opacity: 0; }
    .bg-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(175deg,
        rgba(0,0,0,.14) 0%, rgba(0,0,0,.32) 45%, rgba(0,0,0,.58) 100%);
    }

    /* ─── Signature ──────────────────────────── */
    .sig-wrap {
      position: fixed; top: var(--pad-top); left: var(--pad-x);
      z-index: 20;
      opacity: 0;
      animation: riseIn .9s cubic-bezier(.22,1,.36,1) .3s forwards;
    }
    .sig-wrap img {
      height: clamp(44px, 7vw, 88px);
      width: auto; display: block;
      filter: brightness(0) invert(1);
    }

    /* ─── Stage (centred column) ─────────────── */
    .stage {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: clamp(100px,18vh,160px) var(--pad-x) clamp(80px,14vh,120px);
    }

    /* ─── Identities ─────────────────────────── */
    .identities {
      display: flex; flex-direction: column;
      align-items: center;
      gap: clamp(11px, 2vh, 20px);
      margin-bottom: clamp(26px, 4.5vh, 46px);
    }
    .identity {
      font-size: clamp(14px, 1.8vw, 18px);
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      opacity: 0;
      animation: riseIn .65s cubic-bezier(.22,1,.36,1) forwards;
      transition: letter-spacing 220ms cubic-bezier(.22,1,.36,1),
                  transform 220ms cubic-bezier(.22,1,.36,1),
                  opacity 180ms ease;
      cursor: pointer;
      user-select: none;
      display: inline-block;
    }
    /* Micro-interaction: expand + lift on hover; siblings dim */
    .identity:hover {
      letter-spacing: 0.42em;
      transform: scale(1.06) translateY(-1px);
      opacity: 1;
    }
    .identity:active {
      transform: scale(0.95) translateY(0);
      transition-duration: 80ms;
    }
    .identities:hover .identity:not(:hover) {
      opacity: 0.2;
    }
    .identity:nth-child(1) { animation-delay: .12s; }
    .identity:nth-child(2) { animation-delay: .22s; }
    .identity:nth-child(3) { animation-delay: .32s; }

    /* ─── Brag line ──────────────────────────── */
    .brag {
      height: clamp(14px, 2.2vh, 18px);
      overflow: hidden;
      margin-bottom: clamp(20px, 3.5vh, 34px);
      opacity: 0;
      animation: fadeIn .6s ease .68s forwards;
    }
    .brag-text {
      font-size: clamp(11px, 1.3vw, 14px);
      font-weight: 400;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      display: block;
      transition: opacity .45s ease, transform .45s ease;
    }
    .brag-text.out { opacity: 0; transform: translateY(-6px); }
    .brag-text.in  { opacity: 1; transform: translateY(0); }

    /* ─── Fun links trigger ──────────────────── */
    .fun-trigger {
      font-size: clamp(11px, 1.2vw, 13px);
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(255,255,255,.2);
      background: none; border: none; cursor: pointer;
      font-family: var(--font);
      display: inline-flex; align-items: center; gap: 5px;
      padding: 0;
      transition: color .22s;
      opacity: 0;
      animation: fadeIn .6s ease .9s forwards;
    }
    .fun-trigger:hover { color: rgba(255,255,255,.48); }

    /* ─── Social icons (fixed bottom) ───────── */
    .socials {
      position: fixed;
      bottom: clamp(18px, 4vh, 34px);
      left: 50%; transform: translateX(-50%);
      z-index: 20;
      display: flex; gap: clamp(14px, 2.2vw, 20px);
      align-items: center;
      opacity: 0;
      animation: fadeIn .6s ease 1.05s forwards;
    }
    .soc {
      color: rgba(255,255,255,.42);
      text-decoration: none; display: flex; align-items: center;
      transition: color .22s, transform .22s;
    }
    .soc:hover { color: #fff; transform: translateY(-1px); }
    .soc svg { width: clamp(15px, 1.7vw, 18px); height: clamp(15px, 1.7vw, 18px); display: block; }

    /* ─── Low-data pill ──────────────────────── */
    .low-data-pill {
      position: fixed; bottom: clamp(14px,3vh,24px); right: var(--pad-x);
      z-index: 20; display: none; align-items: center; gap: 6px;
      font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,.28); cursor: pointer;
      background: none; border: none; font-family: var(--font);
      transition: color .2s; padding: 0;
    }
    .low-data-pill.visible { display: flex; }
    .low-data-pill:hover { color: rgba(255,255,255,.55); }
    .low-data-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.3); flex-shrink: 0; }

    /* ─── Overlays ───────────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: rgba(6,6,6,.9);
      backdrop-filter: blur(20px) saturate(.8);
      -webkit-backdrop-filter: blur(20px) saturate(.8);
      opacity: 0; pointer-events: none;
      transition: opacity .28s ease;
      padding: var(--pad-x);
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .overlay-x {
      position: absolute; top: var(--pad-top); right: var(--pad-x);
      font-size: 26px; font-weight: 300; line-height: 1;
      color: rgba(255,255,255,.38); background: none; border: none;
      cursor: pointer; transition: color .2s; font-family: var(--font);
    }
    .overlay-x:hover { color: rgba(255,255,255,.8); }
    .bathroom-msg {
      font-size: clamp(22px, 4.5vw, 44px); font-weight: 400;
      letter-spacing: -.015em; text-align: center;
      color: rgba(255,255,255,.8);
    }
    .links-list { display: flex; flex-direction: column; gap: 10px; width: min(400px, 88vw); }
    .link-card {
      display: flex; flex-direction: column; gap: 3px;
      padding: 16px 20px;
      border: 1px solid rgba(255,255,255,.09); border-radius: 10px;
      text-decoration: none; color: #fff;
      transition: background .2s, border-color .2s;
    }
    .link-card:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.2); }
    .link-title { font-size: clamp(14px, 1.8vw, 16px); font-weight: 500; letter-spacing: -.01em; }
    .link-sub { font-size: 11px; letter-spacing: .06em; color: rgba(255,255,255,.4); text-transform: uppercase; }

    /* ─── Animations ─────────────────────────── */
    @keyframes riseIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .identity, .sig-wrap, .brag, .fun-trigger, .socials { animation-name: fadeIn; animation-duration: .3s; }
    }
  </style>
</head>

<script>
/* ════════ PHOTOS — swap paths here to update ════════ */
const PHOTOS = [
  'assets/photos/4.jpg',
  'assets/photos/8.jpg',
  'assets/photos/3.jpg',
  'assets/photos/2.jpg',
  'assets/photos/13.jpg',
  'assets/photos/7.jpg',
  'assets/photos/14.jpg',
  'assets/photos/1.jpg',
  'assets/photos/10.jpg',
  'assets/photos/9.jpg',
  'assets/photos/6.jpg',
  'assets/photos/12.jpg',
];

/* ════════ BRAG — edit /src/content/brags.txt, tag: home ════════ */
async function fetchBrags(tag) {
  try {
    const r = await fetch('/src/content/brags.txt');
    const txt = await r.text();
    return txt.split('\n').map(l => l.trim()).filter(Boolean).flatMap(l => {
      const [b, t] = l.split('|');
      if (!b || !t) return [];
      return t.split(',').map(s => s.trim()).includes(tag) ? [b.trim()] : [];
    });
  } catch { return []; }
}

/* ════════ BURST ENGINE — smooth, pre-painted, eased ════════ */
(function() {
  const l1 = document.getElementById('layer1');
  const l2 = document.getElementById('layer2');
  let front = l1, back = l2;
  const loaded = [];
  let pool = [], pidx = 0, lastShown = null;

  function shuffle(a) {
    const b = [...a];
    for (let i = b.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]];
    }
    return b;
  }

  function nextSrc() {
    const avail = loaded.length ? loaded : PHOTOS;
    if (pidx >= pool.length) {
      let f = shuffle([...avail]);
      if (lastShown && f.length > 1 && f[0] === lastShown) f = [...f.slice(1), f[0]];
      pool = f; pidx = 0;
    }
    lastShown = pool[pidx];
    return pool[pidx++];
  }

  // Pre-paint back layer — key to flicker-free transitions
  function prime(src) {
    back.style.transition = 'none';
    back.style.backgroundImage = `url('${src}')`;
    back.getBoundingClientRect(); // force reflow
  }

  function crossfade(ms, ease) {
    back.style.transition  = `opacity ${ms}ms ${ease}`;
    front.style.transition = `opacity ${ms}ms ${ease}`;
    back.style.opacity  = '1';
    front.style.opacity = '0';
    [front, back] = [back, front];
  }

  // [holdMs, fadeMs, easing] — holdMs before showing next photo
  const SCH = [
    ...Array(12).fill(0).map(() => [120, 90, 'ease-in-out']),
    [200, 130, 'ease-in-out'],
    [320, 180, 'ease-in-out'],
    [500, 280, 'cubic-bezier(.4,0,.2,1)'],
    [750, 400, 'cubic-bezier(.4,0,.2,1)'],
    [1300, 600, 'cubic-bezier(.4,0,.2,1)'],
    [2600, 780, 'cubic-bezier(.4,0,.2,1)'],
    [5200, 780, 'cubic-bezier(.4,0,.2,1)'],
  ];
  const STEADY = [7000, 780, 'cubic-bezier(.4,0,.2,1)'];

  function startBurst() {
    // First image: fade in
    prime(nextSrc());
    back.style.transition = 'opacity 450ms ease-in';
    back.style.opacity = '1';
    [front, back] = [back, front];

    let step = 0;
    function tick() {
      const [hold, fade, ease] = step < SCH.length ? SCH[step++] : STEADY;
      // Pre-paint next image on hidden layer NOW — browser gets full `hold` ms to decode it
      prime(nextSrc());
      setTimeout(() => { crossfade(fade, ease); tick(); }, hold);
    }
    setTimeout(tick, 500);
  }

  function preload(cb) {
    let called = false;
    PHOTOS.forEach(src => {
      const img = new Image();
      img.onload = () => { loaded.push(src); if (!called) { called = true; cb(); } };
      img.src = src;
    });
  }

  const isSlowConn = () => {
    const c = navigator.connection||navigator.mozConnection||navigator.webkitConnection;
    return c && (c.saveData||c.effectiveType==='slow-2g'||c.effectiveType==='2g');
  };

  window.addEventListener('load', () => {
    if (isSlowConn()) {
      l1.style.backgroundImage = `url('${PHOTOS[0]}')`;
      l1.style.opacity = '1';
      document.getElementById('ldPill').classList.add('visible');
    } else {
      preload(startBurst);
    }
  });

  document.getElementById('ldPill').addEventListener('click', () => {
    document.getElementById('ldPill').classList.remove('visible');
    if (!loaded.length) preload(startBurst); else startBurst();
  });
})();

/* ════════ BRAG ROTATION ════════ */
(async () => {
  const lines = await fetchBrags('home');
  if (!lines.length) return;
  const el = document.getElementById('bragText');
  let idx = 0;
  el.textContent = lines[0];
  setInterval(() => {
    el.classList.remove('in'); el.classList.add('out');
    setTimeout(() => {
      idx = (idx + 1) % lines.length;
      el.textContent = lines[idx];
      el.classList.remove('out'); el.classList.add('in');
    }, 460);
  }, 4200);
})();

/* ════════ OVERLAYS ════════ */
const open  = id => document.getElementById(id).classList.add('open');
const close = id => document.getElementById(id).classList.remove('open');
document.getElementById('funBtn').addEventListener('click', () => open('funLinksOverlay'));
document.getElementById('funLinksClose').addEventListener('click', () => close('funLinksOverlay'));
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target===el) close(el.id); });
});
document.addEventListener('keydown', e => {
  if (e.key==='Escape') document.querySelectorAll('.overlay.open').forEach(el => close(el.id));
});
</script>
