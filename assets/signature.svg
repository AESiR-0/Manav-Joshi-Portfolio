<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 44" width="96" height="44" fill="none">
  <!-- M -->
  <path d="M 5,36 L 5,10 C 5,3 13,3 17,14 C 21,3 29,3 29,10 L 29,36"
    stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="120" stroke-dashoffset="120">
    <animate attributeName="stroke-dashoffset" from="120" to="0" dur="0.6s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>
  <!-- J -->
  <path d="M 42,8 L 58,8 M 54,8 L 54,30 C 54,41 38,43 36,35"
    stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="90" stroke-dashoffset="90">
    <animate attributeName="stroke-dashoffset" from="90" to="0" dur="0.55s" begin="0.65s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>
  <!-- underline flourish -->
  <path d="M 3,40 Q 48,38 90,40"
    stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"
    stroke-dasharray="90" stroke-dashoffset="90">
    <animate attributeName="stroke-dashoffset" from="90" to="0" dur="0.4s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>
</svg>
