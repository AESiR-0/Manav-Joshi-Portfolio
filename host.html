<script>
const PHOTOS=['assets/host/concert-3.jpg','assets/host/concert-1.jpg','assets/photos/4.jpg','assets/photos/8.jpg','assets/host/wedding-1.jpg','assets/photos/2.jpg','assets/photos/7.jpg'];
async function fetchBrags(tag){try{const r=await fetch('/src/content/brags.txt');const txt=await r.text();return txt.split('\n').map(l=>l.trim()).filter(Boolean).flatMap(l=>{const[b,t]=l.split('|');if(!b||!t)return[];return t.split(',').map(s=>s.trim()).includes(tag)?[b.trim()]:[];});}catch{return[];}}
(function(){const l1=document.getElementById('layer1'),l2=document.getElementById('layer2');let front=l1,back=l2;const loaded=[];let pool=[],pidx=0,last=null;function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}function nextSrc(){const av=loaded.length?loaded:PHOTOS;if(pidx>=pool.length){let f=shuffle([...av]);if(last&&f.length>1&&f[0]===last)f=[...f.slice(1),f[0]];pool=f;pidx=0;}last=pool[pidx];return pool[pidx++];}function prime(src){back.style.transition='none';back.style.backgroundImage=`url('${src}')`;back.getBoundingClientRect();}function crossfade(ms,ease){back.style.transition=`opacity ${ms}ms ${ease}`;front.style.transition=`opacity ${ms}ms ${ease}`;back.style.opacity='1';front.style.opacity='0';[front,back]=[back,front];}const SCH=[...Array(12).fill(0).map(()=>[120,90,'ease-in-out']),[200,130,'ease-in-out'],[320,180,'ease-in-out'],[500,280,'cubic-bezier(.4,0,.2,1)'],[750,400,'cubic-bezier(.4,0,.2,1)'],[1300,600,'cubic-bezier(.4,0,.2,1)'],[2600,780,'cubic-bezier(.4,0,.2,1)'],[5200,780,'cubic-bezier(.4,0,.2,1)']];const STEADY=[7000,780,'cubic-bezier(.4,0,.2,1)'];function start(){prime(nextSrc());back.style.transition='opacity 450ms ease-in';back.style.opacity='1';[front,back]=[back,front];let step=0;function tick(){const[hold,fade,ease]=step<SCH.length?SCH[step++]:STEADY;prime(nextSrc());setTimeout(()=>{crossfade(fade,ease);tick();},hold);}setTimeout(tick,500);}function preload(cb){let called=false;PHOTOS.forEach(src=>{const img=new Image();img.onload=()=>{loaded.push(src);if(!called){called=true;cb();}};img.src=src;});}const slow=()=>{const c=navigator.connection||navigator.mozConnection||navigator.webkitConnection;return !!(c&&c.saveData);};const boot=()=>{if(slow()){l1.style.backgroundImage=`url('${PHOTOS[0]}')`;l1.style.opacity='1';}else preload(start);};if(document.readyState==='complete')boot();else window.addEventListener('load',boot);})();
(async()=>{const lines=await fetchBrags('host');if(!lines.length)return;const el=document.getElementById('bragText');let idx=0;el.textContent=lines[0];setInterval(()=>{el.classList.remove('in');el.classList.add('out');setTimeout(()=>{idx=(idx+1)%lines.length;el.textContent=lines[idx];el.classList.remove('out');el.classList.add('in');},460);},4200);})();
